name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check extension JavaScript syntax
        run: |
          node --check background.js
          node --check audio-worklet.js
          node --check offscreen.js
          node --check popup.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install local server dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r local-whisper-server/requirements.txt

      - name: Check local server
        run: |
          python -m py_compile local-whisper-server/server.py
          cd local-whisper-server
          python - <<'PY'
          import server

          client = server.app.test_client()
          assert client.get("/health").status_code == 200
          assert client.get("/health", headers={"Origin": "https://example.com"}).status_code == 403
          assert client.get("/health", headers={"Origin": "chrome-extension://abcdefghijklmnop"}).status_code == 200
          PY
